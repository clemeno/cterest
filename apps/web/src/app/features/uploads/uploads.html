<div class="page">
	<h1>My uploads</h1>

	<div
		class="dropzone"
		[class.dragging]="dragging()"
		(dragover)="$event.preventDefault(); dragging.set(true)"
		(dragleave)="dragging.set(false)"
		(drop)="onDrop($event)"
	>
		<mat-icon>cloud_upload</mat-icon>
		<p>Drag &amp; drop files here, or</p>
		<button mat-flat-button color="primary" (click)="picker.click()">Choose files</button>
		<input #picker type="file" multiple hidden (change)="onPick($event)" />
	</div>

	@if (uploading()) {
		<mat-progress-bar mode="indeterminate"></mat-progress-bar>
	}

	<app-media-table
		[items]="items()"
		[total]="total()"
		[pageSize]="pageSize()"
		[pageIndex]="pageIndex()"
		[rawUrl]="rawUrl"
		[showDelete]="true"
		(pageChange)="onPage($event)"
		(deleted)="onDelete($event)"
	></app-media-table>
</div>
