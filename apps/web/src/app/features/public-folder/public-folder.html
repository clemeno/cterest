<div class="page">
	@if (meta(); as m) {
		<div class="header">
			<h1>{{ m.name }}</h1>
			<mat-chip-set>
				<mat-chip>{{ m.visibility }}</mat-chip>
			</mat-chip-set>
		</div>

		<app-media-table
			[items]="items()"
			[total]="total()"
			[pageSize]="pageSize()"
			[pageIndex]="pageIndex()"
			[rawUrl]="rawUrl"
			(pageChange)="onPage($event)"
		></app-media-table>
	} @else if (denied()) {
		<div class="denied">
			<mat-icon>lock</mat-icon>
			<h2>This folder is not available</h2>
			<p>It may be private, removed, or require you to sign in as a member.</p>
			<a mat-flat-button color="primary" routerLink="/sign-in">Sign in</a>
		</div>
	}
</div>
